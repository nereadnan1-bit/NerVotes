{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="text-center mb-5">
        <h2 class="fw-bold">{{ election.name }}</h2>
        <p class="text-muted">Review the candidates below and cast your secure vote.</p>
    </div>

    <form action="{{ url_for('cast_vote', election_id=election.id) }}" method="POST">
        <div class="row justify-content-center">
            {% for c in candidates %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0 h-100 text-center p-3">
                    <div class="card-body">
                        <div class="rounded-circle bg-light d-inline-block p-4 mb-3">
                            <i class="fas fa-user-tie fa-3x text-primary"></i>
                        </div>
                        <h4 class="fw-bold">{{ c.user.username }}</h4>
                        <p class="small text-muted">Verified Candidate</p>
                        <input type="radio" class="btn-check" name="candidate_id" id="btncheck{{ c.id }}" value="{{ c.id }}" required>
                        <label class="btn btn-outline-primary w-100 fw-bold" for="btncheck{{ c.id }}">Select Candidate</label>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success btn-lg px-5 shadow">Confirm My Vote</button>
            <div class="mt-3">
                <a href="{{ url_for('voter_dashboard') }}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left"></i> Skip & Return to Dashboard
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
