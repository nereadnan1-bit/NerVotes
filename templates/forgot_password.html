{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow border-0 animate__animated animate__fadeIn">
            <h4 class="text-center fw-bold mb-3" style="color: #1a237e;">Reset Password</h4>
            <p class="text-muted small text-center">Enter your username to receive a reset link.</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="background-color: #1a237e;">Send Reset Link</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="small text-decoration-none text-muted">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
