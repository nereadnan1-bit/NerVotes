{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow animate__animated animate__fadeInUp border-0">
            <div class="text-center mb-4">
                <h3 class="fw-bold" style="color: #1a237e;">Login</h3>
                <p class="text-muted small">Access the E-Voting Portal</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted">@</span>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>

                <button class="btn btn-primary w-100 mt-3 shadow-sm py-2" type="submit" style="background-color: #1a237e; border: none;">
                    Continue to Verification
                </button>
            </form>

            <div class="mt-4 text-center border-top pt-3">
                <div class="mb-2">
                    <a href="{{ url_for('forgot_password') }}" class="text-decoration-none small" style="color: #1a237e;">Forgot Password?</a>
                </div>
                <div>
                    <span class="small text-muted">Don't have an account yet? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color: #1a237e;"> Register here</a></span>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
