{% extends "base.html" %}
{% block content %}

<h2>Audit Logs</h2>

<table class="table table-dark table-striped mt-4">
    <thead>
        <tr>
            <th>User ID</th>
            <th>Action</th>
            <th>Timestamp</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.user_id }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.timestamp }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
